services:
  - type: web
    name: breathe-esg-backend
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        sync: false  # Managed manually on Render Dashboard (points to Supabase connection pooling URL)
      - key: DJANGO_SETTINGS_MODULE
        value: "config.settings.production"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "breathe-esg-backend-g2h9.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://breathe-esg-kappa.vercel.app,http://localhost:5173"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://breathe-esg-backend-g2h9.onrender.com,https://breathe-esg-kappa.vercel.app"

  - type: static
    name: breathe-esg-frontend
    buildCommand: "npm install && npm run build"
    publishDir: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: breathe-esg-backend
          property: url
