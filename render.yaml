services:
  - type: web
    name: breathe-esg-backend
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python ingest_all.py"
    startCommand: "gunicorn breathe_esg.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true

  - type: static
    name: breathe-esg-frontend
    buildCommand: "npm install && npm run build"
    publishDir: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: breathe-esg-backend
          property: url

databases:
  - name: breathe-esg-db
    plan: free
