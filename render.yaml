services:
  - type: web
    name: breathe-esg-backend
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        sync: false  # Managed manually on Render Dashboard (points to Supabase connection pooling URL)
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true

  - type: static
    name: breathe-esg-frontend
    buildCommand: "npm install && npm run build"
    publishDir: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: breathe-esg-backend
          property: url
